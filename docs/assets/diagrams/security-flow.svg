<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">DARAK security flow</title>
  <desc id="desc">Security and governance flow for DARAK backend.</desc>
  <defs><marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#94a3b8"/></marker></defs>
  <style>.bg{fill:#111827}.title{font:700 40px Arial,sans-serif;fill:#f8fafc}.sub{font:400 18px Arial,sans-serif;fill:#cbd5e1}.box{fill:#0f172a;stroke:#38bdf8;stroke-width:2;rx:16}.warn{fill:#2f1b0b;stroke:#f59e0b;stroke-width:2;rx:16}.text{font:700 20px Arial,sans-serif;fill:#fff}.small{font:400 14px Arial,sans-serif;fill:#dbeafe}.line{stroke:#94a3b8;stroke-width:3;marker-end:url(#a)}</style>
  <rect width="1280" height="720" class="bg"/>
  <text x="64" y="76" class="title">Security and Governance Flow</text>
  <text x="64" y="110" class="sub">Request authentication, role checks, compound scope, audit trails, and startup guardrails.</text>
  <rect x="70" y="210" width="190" height="110" class="box"/><text x="100" y="252" class="text">Request</text><text x="100" y="280" class="small">Bearer token or</text><text x="100" y="300" class="small">anonymous health route</text>
  <rect x="335" y="210" width="190" height="110" class="box"/><text x="365" y="252" class="text">JWT + Roles</text><text x="365" y="280" class="small">Identity, refresh</text><text x="365" y="300" class="small">tokens, policies</text>
  <rect x="600" y="210" width="210" height="110" class="box"/><text x="630" y="252" class="text">Compound Scope</text><text x="630" y="280" class="small">Current user allowed</text><text x="630" y="300" class="small">compound boundaries</text>
  <rect x="890" y="210" width="220" height="110" class="box"/><text x="920" y="252" class="text">Domain Action</text><text x="920" y="280" class="small">Service-level rules</text><text x="920" y="300" class="small">and validations</text>
  <rect x="440" y="445" width="210" height="110" class="warn"/><text x="470" y="487" class="text">Audit Trail</text><text x="470" y="515" class="small">Sensitive actions and</text><text x="470" y="535" class="small">document access logs</text>
  <rect x="730" y="445" width="260" height="110" class="warn"/><text x="760" y="487" class="text">Startup Guardrails</text><text x="760" y="515" class="small">Secrets, registration,</text><text x="760" y="535" class="small">bootstrap, demo seed</text>
  <path d="M260 265 H335" class="line"/><path d="M525 265 H600" class="line"/><path d="M810 265 H890" class="line"/><path d="M1000 320 C960 410 880 430 860 445" class="line"/><path d="M705 320 C690 390 640 420 610 445" class="line"/>
</svg>
