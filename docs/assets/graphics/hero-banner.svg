<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="650" viewBox="0 0 1600 650" role="img" aria-labelledby="hero-title hero-desc">
  <title id="hero-title">DARAK premium repository hero banner</title>
  <desc id="hero-desc">Dark commercial hero banner for the DARAK residential compound management backend.</desc>
  
  <defs>
    <linearGradient id="hero-bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#07111f"/>
      <stop offset="0.48" stop-color="#0b1628"/>
      <stop offset="1" stop-color="#0e2037"/>
    </linearGradient>
    <linearGradient id="hero-panel" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#172a43"/>
      <stop offset="1" stop-color="#0f1d31"/>
    </linearGradient>
    <linearGradient id="hero-accent" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#2dd4ff"/>
      <stop offset="1" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="hero-accent-soft" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#2dd4ff" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#a78bfa" stop-opacity="0.08"/>
