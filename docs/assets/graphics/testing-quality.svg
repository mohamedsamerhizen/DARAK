<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="800" viewBox="0 0 1400 800" role="img" aria-labelledby="quality-title quality-desc">
  <title id="quality-title">DARAK testing and quality infographic</title>
  <desc id="quality-desc">Quality infographic displaying 677 tests passed, build passed, Docker, GitHub Actions, SQL Server, and Swagger.</desc>
  
  <defs>
    <linearGradient id="quality-bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#07111f"/>
      <stop offset="0.48" stop-color="#0b1628"/>
      <stop offset="1" stop-color="#0e2037"/>
    </linearGradient>
    <linearGradient id="quality-panel" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#172a43"/>
      <stop offset="1" stop-color="#0f1d31"/>
    </linearGradient>
    <linearGradient id="quality-accent" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#45e6a8"/>
      <stop offset="1" stop-color="#2dd4ff"/>
    </linearGradient>
    <linearGradient id="quality-accent-soft" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#45e6a8" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#2dd4ff" stop-opacity="0.08"/>
    </linearGradient>
    <radialGradient id="quality-glow-a" cx="26%" cy="18%" r="52%">
      <stop offset="0" stop-color="#45e6a8" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#45e6a8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="quality-glow-b" cx="82%" cy="72%" r="48%">
      <stop offset="0" stop-color="#2dd4ff" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#2dd4ff" stop-opacity="0"/>
    </radialGradient>
    <filter id="quality-shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000814" flood-opacity="0.42"/>
    </filter>
    <filter id="quality-soft-shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="10" stdDeviation="9" flood-color="#000814" flood-opacity="0.32"/>
    </filter>
    <pattern id="quality-grid" width="46" height="46" patternUnits="userSpaceOnUse">
      <path d="M46 0H0V46" fill="none" stroke="#2b4564" stroke-opacity="0.22" stroke-width="1"/>
    </pattern>
    <style>
      .label { font-family: Inter, Segoe UI, Arial, sans-serif; letter-spacing: 0; }
      .mono { font-family: Cascadia Mono, Consolas, monospace; letter-spacing: 0; }
    </style>
  </defs>
