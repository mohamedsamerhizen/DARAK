  <rect width="1400" height="800" rx="34" fill="url(#quality-grid)" opacity="0.68"/>
  <rect width="1400" height="800" rx="34" fill="url(#quality-glow-a)"/>
  <rect width="1400" height="800" rx="34" fill="url(#quality-glow-b)"/>
  <path d="M0 708C230 650 375 758 580 712C845 652 1004 774 1400 684" fill="none" stroke="url(#quality-accent)" stroke-width="2" stroke-opacity="0.38"/>
