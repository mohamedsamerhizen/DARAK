    <path d="M756 389l5 5 11-13" fill="none" stroke="#2dd4ff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  </g><text x="804" y="396" fill="#f7fbff" font-size="23" font-weight="800" text-anchor="start" >GitHub Actions</text>
  <g opacity="1" filter="url(#quality-soft-shadow)">
    <rect x="1016" y="342" width="262" height="92" rx="22" fill="#0f2237" stroke="#28445f" stroke-opacity="0.82"/>
    <rect x="1016" y="342" width="262" height="5" rx="22" fill="#ff6b7f"/>
  </g>
  <g>
    <circle cx="1064" cy="388" r="18" fill="#ff6b7f" fill-opacity="0.12" stroke="#ff6b7f" stroke-opacity="0.7"/>
    <path d="M1056 389l5 5 11-13" fill="none" stroke="#ff6b7f" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  </g><text x="1104" y="396" fill="#f7fbff" font-size="23" font-weight="800" text-anchor="start" >SQL Server Verified</text>
  <g opacity="1" filter="url(#quality-soft-shadow)">
    <rect x="716" y="474" width="600" height="92" rx="22" fill="#0f2237" stroke="#28445f" stroke-opacity="0.82"/>
