    <rect x="1016" y="210" width="262" height="5" rx="22" fill="#5b8cff"/>
  </g>
  <g>
    <circle cx="1064" cy="256" r="18" fill="#5b8cff" fill-opacity="0.12" stroke="#5b8cff" stroke-opacity="0.7"/>
    <path d="M1056 257l5 5 11-13" fill="none" stroke="#5b8cff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  </g><text x="1104" y="264" fill="#f7fbff" font-size="23" font-weight="800" text-anchor="start" >Docker Ready</text>
  <g opacity="1" filter="url(#quality-soft-shadow)">
