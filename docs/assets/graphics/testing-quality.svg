  <g>
    <circle cx="764" cy="520" r="18" fill="#f8bf4c" fill-opacity="0.12" stroke="#f8bf4c" stroke-opacity="0.7"/>
    <path d="M756 521l5 5 11-13" fill="none" stroke="#f8bf4c" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  </g><text x="804" y="528" fill="#f7fbff" font-size="23" font-weight="800" text-anchor="start" >Swagger Enabled</text>
  
