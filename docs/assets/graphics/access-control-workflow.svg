<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="760" viewBox="0 0 1400 760" role="img" aria-labelledby="access-title access-desc">
  <title id="access-title">DARAK access control workflow</title>
  <desc id="access-desc">Access Control Workflow flow infographic.</desc>
  
  <defs>
    <linearGradient id="access-bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#07111f"/>
      <stop offset="0.48" stop-color="#0b1628"/>
      <stop offset="1" stop-color="#0e2037"/>
    </linearGradient>
    <linearGradient id="access-panel" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#172a43"/>
      <stop offset="1" stop-color="#0f1d31"/>
    </linearGradient>
    <linearGradient id="access-accent" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#2dd4ff"/>
      <stop offset="1" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="access-accent-soft" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#2dd4ff" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#a78bfa" stop-opacity="0.08"/>
