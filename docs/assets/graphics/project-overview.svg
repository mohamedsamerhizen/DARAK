<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="850" viewBox="0 0 1400 850" role="img" aria-labelledby="overview-title overview-desc">
  <title id="overview-title">DARAK project overview</title>
  <desc id="overview-desc">Project statistics and backend overview infographic.</desc>
  
  <defs>
    <linearGradient id="overview-bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#07111f"/>
      <stop offset="0.48" stop-color="#0b1628"/>
      <stop offset="1" stop-color="#0e2037"/>
    </linearGradient>
    <linearGradient id="overview-panel" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#172a43"/>
      <stop offset="1" stop-color="#0f1d31"/>
    </linearGradient>
    <linearGradient id="overview-accent" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#2dd4ff"/>
      <stop offset="1" stop-color="#45e6a8"/>
    </linearGradient>
    <linearGradient id="overview-accent-soft" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#2dd4ff" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#45e6a8" stop-opacity="0.08"/>
    </linearGradient>
    <radialGradient id="overview-glow-a" cx="26%" cy="18%" r="52%">
      <stop offset="0" stop-color="#2dd4ff" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#2dd4ff" stop-opacity="0"/>
    </radialGradient>
