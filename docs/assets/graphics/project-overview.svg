    </filter>
    <filter id="overview-soft-shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="10" stdDeviation="9" flood-color="#000814" flood-opacity="0.32"/>
    </filter>
    <pattern id="overview-grid" width="46" height="46" patternUnits="userSpaceOnUse">
