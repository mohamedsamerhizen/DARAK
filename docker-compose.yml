services:
  api:
    restart: unless-stopped
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: "${ASPNETCORE_ENVIRONMENT:-Development}"
      ASPNETCORE_URLS: "http://+:8080"
      ConnectionStrings__DefaultConnection: "Server=sqlserver,1433;Database=${SQLSERVER_DATABASE:-DARAKDb};User Id=sa;Password=${SQLSERVER_SA_PASSWORD};TrustServerCertificate=True;MultipleActiveResultSets=true"
      Jwt__Issuer: "${JWT_ISSUER:-DARAK.Api}"
      Jwt__Audience: "${JWT_AUDIENCE:-DARAK.Api}"
      Jwt__SecretKey: "${JWT_SECRET_KEY}"
      Jwt__AccessTokenMinutes: "${JWT_ACCESS_TOKEN_MINUTES:-15}"
      Jwt__RefreshTokenDays: "${JWT_REFRESH_TOKEN_DAYS:-7}"
      DevelopmentSuperAdmin__Email: "${DEVELOPMENT_SUPERADMIN_EMAIL}"
      DevelopmentSuperAdmin__Password: "${DEVELOPMENT_SUPERADMIN_PASSWORD}"
      DevelopmentSuperAdmin__FullName: "${DEVELOPMENT_SUPERADMIN_FULLNAME:-Development SuperAdmin}"
      Notifications__WorkerEnabled: "${NOTIFICATIONS_WORKER_ENABLED:-false}"
      Notifications__Email__Enabled: "${NOTIFICATIONS_EMAIL_ENABLED:-false}"
      Notifications__Email__Host: "${NOTIFICATIONS_EMAIL_HOST:-}"
      Notifications__Email__Port: "${NOTIFICATIONS_EMAIL_PORT:-587}"
      Notifications__Email__EnableSsl: "${NOTIFICATIONS_EMAIL_ENABLE_SSL:-true}"
      Notifications__Email__Username: "${NOTIFICATIONS_EMAIL_USERNAME:-}"
      Notifications__Email__Password: "${NOTIFICATIONS_EMAIL_PASSWORD:-}"
      Notifications__Email__FromEmail: "${NOTIFICATIONS_EMAIL_FROM:-}"
      Notifications__Sms__Enabled: "${NOTIFICATIONS_SMS_ENABLED:-false}"
      Notifications__Sms__EndpointUrl: "${NOTIFICATIONS_SMS_ENDPOINT_URL:-}"
      Notifications__Sms__ApiKey: "${NOTIFICATIONS_SMS_API_KEY:-}"
      Notifications__Sms__SenderId: "${NOTIFICATIONS_SMS_SENDER_ID:-DARAK}"
    ports:
      - "8080:8080"
    volumes:
      - document-uploads:/app/App_Data/Uploads/Documents
    depends_on:
      sqlserver:
        condition: service_healthy

  sqlserver:
    restart: unless-stopped
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Developer"
      MSSQL_SA_PASSWORD: "${SQLSERVER_SA_PASSWORD}"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$${MSSQL_SA_PASSWORD}\" -C -Q \"SELECT 1\" || /opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P \"$${MSSQL_SA_PASSWORD}\" -Q \"SELECT 1\""]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

volumes:
  sqlserver-data:
  document-uploads:

